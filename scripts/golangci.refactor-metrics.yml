# golangci-lint profile: refactoring and long-term maintainability backlog.
# Run: ./scripts/analyze.go.refactor-metrics.sh
#
# Complexity & structure: gocognit, cyclop, nestif, funlen, maintidx.
# Correctness & API hygiene: errcheck, errorlint, govet, staticcheck, unused, bodyclose,
#   nilerr, nilnil, noctx, ineffassign, nakedret, unparam.
# Readability & drift: goconst, misspell, dupword, prealloc.
#
# Not enabled: fatcontext — it only applies to stdlib context.Context being reassigned inside
# loops (deepening the cancel/value chain). It does not relate to large template "context" data;
# first-party code here also uses few context.With* calls outside excluded folders.
version: "2"

run:
  timeout: 15m
  tests: true
  relative-path-mode: gomod

linters:
  default: none
  enable:
    - bodyclose
    - cyclop
    - dupword
    - errcheck
    - errorlint
    - funlen
    - gocognit
    - goconst
    - govet
    - ineffassign
    - maintidx
    - misspell
    - nakedret
    - nestif
    - nilerr
    - nilnil
    - noctx
    - prealloc
    - staticcheck
    - unparam
    - unused
  settings:
    cyclop:
      max-complexity: 15
      package-average: 12.0
    errcheck:
      check-type-assertions: true
    errorlint:
      comparison: true
      asserts: true
    funlen:
      lines: 100
      statements: 60
    gocognit:
      min-complexity: 30
    goconst:
      min-len: 3
      min-occurrences: 4
      match-constant: true
    maintidx:
      under: 40
    nakedret:
      max-func-lines: 40
    nestif:
      min-complexity: 6
    unparam:
      check-exported: false
  exclusions:
    # paths:
    #   - (^|/)examples(/|$)
    rules:
      # Tests: permissive for error checks, HTTP without context, and unused parameters.
      - path: _test\.go
        linters:
          - errcheck
          - noctx
          - unparam

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
